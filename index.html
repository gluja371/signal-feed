<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Signal Feed</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#08090C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Signal" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    html, body { margin: 0; padding: 0; background: #040507; overscroll-behavior: none; }
    #loading { color: #8A93A6; font: 14px system-ui; display: grid; place-items: center;
               height: 100dvh; text-align: center; padding: 20px; white-space: pre-wrap; }
  </style>

  <!-- pinned versions so a library update can never break the app -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading">Loading today's feed… (v2)</div></div>

  <script>
    function showProblem(msg) {
      var el = document.getElementById("loading");
      if (el) el.textContent = "Something broke:\n\n" + msg;
    }
    window.addEventListener("error", function (e) {
      showProblem((e.message || "unknown error") + (e.filename ? "\nin " + e.filename : ""));
    });
    if (typeof React === "undefined") showProblem("React library failed to load from unpkg.com — network may be blocking it.");
    fetch("app.jsx").then(function (r) {
      if (!r.ok) { showProblem("app.jsx is missing (HTTP " + r.status + ")"); return r.text(); }
      return r.text();
    }).then(function (t) {
      if (t && t.trim().indexOf("import") === 0) showProblem("Old preview version of app.jsx is being served — cache not refreshed yet.");
    });
    fetch("feed.json").then(function (r) { if (!r.ok) showProblem("feed.json is missing (HTTP " + r.status + ")"); });
  </script>

  <script type="text/babel" data-presets="react" src="app.jsx"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js"); });
    }
  </script>
</body>
</html>
